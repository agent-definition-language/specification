<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640" role="img" aria-labelledby="pd-title pd-desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="pd-title">Passport distillation: a compact, separately-verifiable credential derived from the full ADL document</title>
  <desc id="pd-desc">A left-to-right class/object diagram in three columns. On the left, the full ADL Document lists all of its member groups; the identity-and-trust members (adl_spec, id and provider, cryptographic_identity, security attestation and scopes, lifecycle status, permissions, and data_classification) are highlighted as the distilled subset, while the operational members (capabilities, tools, resources, model, runtime behaviour and degradation, human_oversight, anomaly_baseline) are greyed as staying behind in the full document. A single derive arrow crosses to the middle column, the Agent Passport, a compact box carrying only that distilled subset — the members a counterparty needs to answer who is this agent and can I trust this document. A present arrow then carries the passport to the right column, a counterparty, attached to a request or dereferenced by URL. A note states the passport is a typed projection of the document: identity and trust travel; capabilities and runtime stay behind, and the full document is resolved separately when needed.</desc>

  <defs>
    <marker id="pd-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="640" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Passport Distillation</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" font-style="italic" fill="#475569">A compact, separately-verifiable credential derived from the full ADL document</text>

  <!-- ===================== LEFT: full ADL document ===================== -->
  <rect x="40" y="92" width="300" height="476" rx="10" fill="#f8fafc" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="190" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#0b57d0">ADL Document</text>
  <text x="190" y="132" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">the full agent definition (Core)</text>

  <!-- distilled subset header -->
  <text x="60" y="158" font-size="9.5" font-weight="700" fill="#0b57d0" letter-spacing="0.6">DISTILLED INTO THE PASSPORT</text>
  <!-- IN rows -->
  <g font-size="11" fill="#0f172a">
    <rect x="56" y="164" width="268" height="22" rx="4" fill="#e8f0fe"/>
    <text x="66" y="179">adl_spec &#8212; spec version</text>
    <rect x="56" y="190" width="268" height="22" rx="4" fill="#e8f0fe"/>
    <text x="66" y="205">id &#183; provider &#8212; identity</text>
    <rect x="56" y="216" width="268" height="22" rx="4" fill="#e8f0fe"/>
    <text x="66" y="231">cryptographic_identity</text>
    <rect x="56" y="242" width="268" height="22" rx="4" fill="#e8f0fe"/>
    <text x="66" y="257">security &#8212; attestation &#183; scopes</text>
    <rect x="56" y="268" width="268" height="22" rx="4" fill="#e8f0fe"/>
    <text x="66" y="283">lifecycle.status</text>
    <rect x="56" y="294" width="268" height="22" rx="4" fill="#e8f0fe"/>
    <text x="66" y="309">permissions</text>
    <rect x="56" y="320" width="268" height="22" rx="4" fill="#e8f0fe"/>
    <text x="66" y="335">data_classification</text>
  </g>

  <!-- stays-behind header -->
  <text x="60" y="364" font-size="9.5" font-weight="700" fill="#94a3b8" letter-spacing="0.6">STAYS IN THE FULL DOCUMENT</text>
  <!-- OUT rows -->
  <g font-size="11" fill="#94a3b8">
    <rect x="56" y="370" width="268" height="20" rx="4" fill="#f1f5f9"/>
    <text x="66" y="384">capabilities</text>
    <rect x="56" y="394" width="268" height="20" rx="4" fill="#f1f5f9"/>
    <text x="66" y="408">tools</text>
    <rect x="56" y="418" width="268" height="20" rx="4" fill="#f1f5f9"/>
    <text x="66" y="432">resources</text>
    <rect x="56" y="442" width="268" height="20" rx="4" fill="#f1f5f9"/>
    <text x="66" y="456">model</text>
    <rect x="56" y="466" width="268" height="20" rx="4" fill="#f1f5f9"/>
    <text x="66" y="480">runtime &#8212; behaviour &#183; degradation</text>
    <rect x="56" y="490" width="268" height="20" rx="4" fill="#f1f5f9"/>
    <text x="66" y="504">human_oversight</text>
    <rect x="56" y="514" width="268" height="20" rx="4" fill="#f1f5f9"/>
    <text x="66" y="528">anomaly_baseline</text>
  </g>

  <!-- ===================== derive arrow (from IN group to passport) ===================== -->
  <line x1="340" y1="249" x2="448" y2="249" stroke="#334155" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#pd-arrow)"/>
  <rect x="356" y="227" width="76" height="16" fill="#ffffff"/>
  <text x="394" y="239" text-anchor="middle" font-size="10.5" font-style="italic" fill="#475569">&#171;derive&#187;</text>
  <text x="394" y="263" text-anchor="middle" font-size="9" fill="#64748b">typed projection</text>

  <!-- ===================== MIDDLE: the passport ===================== -->
  <rect x="450" y="150" width="250" height="290" rx="10" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.75"/>
  <text x="575" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">Agent Passport</text>
  <text x="575" y="192" text-anchor="middle" font-size="9.5" font-style="italic" fill="#92722f">compact &#183; signed &#183; re-verified each exchange</text>

  <g font-size="11" fill="#0f172a">
    <text x="470" y="218">adl_spec</text>
    <text x="470" y="240">id</text>
    <text x="470" y="262">cryptographic_identity</text>
    <text x="470" y="284">security.attestation (+ signature)</text>
    <text x="470" y="306">lifecycle.status</text>
    <text x="470" y="328">provider</text>
    <text x="470" y="350">permissions &#183; data_classification</text>
    <text x="470" y="372">security.scopes</text>
  </g>
  <line x1="466" y1="386" x2="684" y2="386" stroke="#f3d8a8" stroke-width="1"/>
  <text x="575" y="406" text-anchor="middle" font-size="9.5" fill="#92722f">answers: who is this agent?</text>
  <text x="575" y="421" text-anchor="middle" font-size="9.5" fill="#92722f">and can I trust this document?</text>

  <!-- ===================== present arrow (passport to counterparty) ===================== -->
  <line x1="700" y1="249" x2="788" y2="249" stroke="#334155" stroke-width="1.5" marker-end="url(#pd-arrow)"/>
  <rect x="712" y="227" width="64" height="16" fill="#ffffff"/>
  <text x="744" y="239" text-anchor="middle" font-size="10.5" font-style="italic" fill="#475569">&#171;present&#187;</text>
  <text x="744" y="263" text-anchor="middle" font-size="9" fill="#64748b">attached or</text>
  <text x="744" y="275" text-anchor="middle" font-size="9" fill="#64748b">dereferenced</text>

  <!-- ===================== RIGHT: counterparty ===================== -->
  <rect x="790" y="206" width="92" height="86" rx="10" fill="#e6f4ea" stroke="#137333" stroke-width="1.5"/>
  <text x="836" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#0d652d">counter-</text>
  <text x="836" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#0d652d">party</text>

  <!-- ===================== footnote ===================== -->
  <text x="450" y="600" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">The passport is a typed projection of the document: identity and trust travel; capabilities and runtime stay behind.</text>
  <text x="450" y="617" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">A counterparty that needs the agent's complete definition resolves the full ADL document separately.</text>
</svg>

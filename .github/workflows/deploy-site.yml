name: Deploy site

# Spec content changes (including the live draft) should redeploy adl-spec.org so
# /spec/next stays current. The site builds from this repo's content, so a push to
# main pings the website's deploy hook. No-ops until VERCEL_DEPLOY_HOOK is set
# (i.e. once the Vercel project exists).
on:
  push:
    branches: [main]

concurrency:
  group: deploy-site
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trigger:
    name: Trigger website rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Ping deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK not set — skipping (configure once the site is on Vercel)."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" >/dev/null
          echo "Triggered website rebuild."

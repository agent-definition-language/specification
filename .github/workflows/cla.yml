# Contributor License Agreement check.
#
# Signatures are recorded once in a central ledger — the `cla-signatures` branch of the
# governance repo — and honored across every ADL repository, so contributors sign once.
# The cross-repo write uses a short-lived token minted from the org-owned `adl-autobot`
# GitHub App (secrets ADL_APP_ID + ADL_APP_PRIVATE_KEY); no personal PATs.
name: CLA

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  cla-check:
    name: CLA Signature Check
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    steps:
      - name: Mint app token (write governance ledger)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.ADL_APP_CLIENT_ID }}
          private-key: ${{ secrets.ADL_APP_PRIVATE_KEY }}
          owner: agent-definition-language
          repositories: governance
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          path-to-document: 'https://github.com/agent-definition-language/governance/blob/main/CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'
          remote-organization-name: 'agent-definition-language'
          remote-repository-name: 'governance'
          allowlist: terry-nederveld,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can review this pull request, you need to sign the [Contributor License Agreement](https://github.com/agent-definition-language/governance/blob/main/CLA.md).

            **To sign**, comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            You only need to sign once — it applies to all ADL repositories.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          lock-pullrequest-aftermerge: false

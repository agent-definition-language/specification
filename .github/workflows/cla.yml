# Contributor License Agreement check.
#
# Signatures are recorded once in a central ledger — the `cla-signatures` branch of the
# governance repo — and honored across every ADL repository, so contributors sign once.
# Requires a least-privilege PAT (secret CLA_SIGNATURES_TOKEN) able to write that branch
# in agent-definition-language/governance.
name: CLA

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  cla-check:
    name: CLA Signature Check
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-document: 'https://github.com/agent-definition-language/governance/blob/main/CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'
          remote-organization-name: 'agent-definition-language'
          remote-repository-name: 'governance'
          allowlist: terry-nederveld,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can review this pull request, you need to sign the [Contributor License Agreement](https://github.com/agent-definition-language/governance/blob/main/CLA.md).

            **To sign**, comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            You only need to sign once — it applies to all ADL repositories.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          lock-pullrequest-aftermerge: false

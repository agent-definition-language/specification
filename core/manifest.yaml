# ADL Specification Version Manifest
# Metadata for version tracking — the Docusaurus spec plugin handles site versioning.
#
# NOTE: standards-submission metadata (the version -> IETF draft mapping) is kept in
# the private `standardization` repo (ietf-mapping.yaml), not here.

# The current official release shown by default at /spec/
latest: "0.3.0"

# The working draft shown at /spec/next/
next: "_next"

# All versions with their metadata
versions:

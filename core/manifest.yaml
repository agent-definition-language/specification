    status: draft
    label: "0.4.0 (Draft)"

  - id: "0.3.0"
    status: released
    label: "0.3.0"
    released_at: "2026-06-03"

  - id: "0.2.0"
    status: released
    label: "0.2.0"
    released_at: "2026-03-18"

  - id: "0.1.0"
    status: released
    label: "0.1.0"
    released_at: "2026-02-18"
